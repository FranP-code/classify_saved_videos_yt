services:
  youtube-classifier:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../:/workspace:cached
    ports:
      - "6080:6080"
    environment:
      - DISPLAY=:1
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    stdin_open: true
    tty: true
    command: sleep infinity

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped

volumes:
  ollama-data:
